<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Password Generator</title>
    <style>
        /* Basic styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffa781, #5b082d);
            font-family: 'Arial', sans-serif;
        }

        /* Container styling */
        .container {
            background: #2d2e48; /* Muted dark blue background */
            padding: 25px 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        .container:hover {
            transform: scale(1.03);
        }

        /* Title styling */
        h2 {
            font-size: 1.8rem;
            color: #f8f9fa; /* Soft, almost white */
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Password display styling with solid color */
        .password-display {
            font-size: 1.2rem;
            color: #f8f9fa; /* Soft white for readability */
            background-color: #3b3d5a; /* Solid dark color */
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            font-family: monospace;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        /* Password settings styling */
        .password-settings {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .password-settings label {
            color: #cfd9e0; /* Light gray-blue */
            font-size: 1rem;
        }
        .password-settings input {
            width: 60px;
            padding: 8px;
            font-size: 1rem;
            text-align: center;
            border: 1px solid #444a63; /* Dark gray */
            border-radius: 6px;
            background: #373a56; /* Soft dark background for input */
            color: #f8f9fa; /* Light font color for readability */
        }

        /* Button styling */
        .generate-btn {
            background: linear-gradient(135deg, #4b6cb7, #182848);
            color: #f8f9fa;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
        }
        .generate-btn:hover {
            background: linear-gradient(135deg, #182848, #4b6cb7);
            transform: translateY(-2px);
        }
        .generate-btn:active {
            transform: translateY(1px);
            box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Password Generator</h2>
        <div id="password" class="password-display">Your password will appear here</div>
        <div class="password-settings">
            <label for="length">Length:</label>
            <input type="number" id="length" value="12" min="6" max="20">
        </div>
        <button class="generate-btn" onclick="generatePassword()">Generate Password</button>
    </div>

    <script>
        // Function to generate a random password
        function generatePassword() {
            const length = document.getElementById("length").value;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
            let password = "";

            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars.charAt(randomIndex);
            }

            document.getElementById("password").textContent = password;
        }
    </script>
</body>
</html>
